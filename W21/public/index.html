<!-- 
W21 Create a backend system using Node.js, Express.js, and MongoDB for managing books (CRUD operations). 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W21 | Book Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding: 40px 0; }
        .book-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-action { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card book-card p-4 mb-4">
                <h4 id="formTitle">Add Book</h4>
                <input type="hidden" id="bookId">
                <div class="mb-2"><input id="title" class="form-control" placeholder="Book Title"></div>
                <div class="mb-2"><input id="author" class="form-control" placeholder="Author"></div>
                <div class="mb-2"><input id="price" type="number" class="form-control" placeholder="Price"></div>
                <div class="mb-3"><input id="cat" class="form-control" placeholder="Category"></div>
                <button id="saveBtn" class="btn btn-primary w-100" onclick="saveBook()">Save Book</button>
            </div>
            <img src="books.png" class="img-fluid rounded shadow-sm opacity-75">
        </div>

        <div class="col-md-8">
            <div class="card book-card p-4">
                <h4 class="mb-4">Book Repository</h4>
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr><th>Title</th><th>Author</th><th>Price</th><th>Action</th></tr>
                    </thead>
                    <tbody id="bookTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadBooks() {
        const res = await fetch('/api/books');
        const books = await res.json();
        document.getElementById('bookTable').innerHTML = books.map(b => `
            <tr>
                <td><strong>${b.title}</strong><br><small class="text-muted">${b.category}</small></td>
                <td>${b.author}</td>
                <td class="text-success fw-bold">$${b.price}</td>
                <td>
                    <button class="btn btn-sm btn-info text-white me-1" onclick="editBook('${b._id}','${b.title}','${b.author}',${b.price},'${b.category}')">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteBook('${b._id}')">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    async function saveBook() {
        const id = document.getElementById('bookId').value;
        const data = {
            title: document.getElementById('title').value,
            author: document.getElementById('author').value,
            price: document.getElementById('price').value,
            category: document.getElementById('cat').value
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? '/api/books/' + id : '/api/books';

        await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        resetForm();
        loadBooks();
    }

    async function deleteBook(id) {
        if(confirm("Remove this book?")) {
            await fetch('/api/books/' + id, { method: 'DELETE' });
            loadBooks();
        }
    }

    function editBook(id, title, author, price, cat) {
        document.getElementById('bookId').value = id;
        document.getElementById('title').value = title;
        document.getElementById('author').value = author;
        document.getElementById('price').value = price;
        document.getElementById('cat').value = cat;
        document.getElementById('formTitle').innerText = "Edit Book";
    }

    function resetForm() {
        document.getElementById('bookId').value = "";
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.getElementById('formTitle').innerText = "Add Book";
    }

    loadBooks();
</script>

</body>
</html>
