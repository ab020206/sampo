<!-- 
W13 Create an Angular application which will do following actions: User Registration, Login User, Show User Data on Profile Component. 
-->
<!DOCTYPE html>
<html ng-app="userApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W13 | Angular Auth</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #eee;
            padding: 20px;
        }

        .box {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .nav-links {
            text-align: center;
            margin-top: 10px;
            color: blue;
            cursor: pointer;
        }

        .profile {
            text-align: center;
        }
    </style>
</head>

<body ng-controller="UserController">
    <div class="box">
        <!-- Registration View -->
        <div ng-if="view == 'register'">
            <h2>User Registration</h2>
            <div class="form-group">
                <input type="text" ng-model="regData.name" placeholder="Full Name">
            </div>
            <div class="form-group">
                <input type="email" ng-model="regData.email" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" ng-model="regData.password" placeholder="Password">
            </div>
            <button ng-click="register()">Register</button>
            <div class="nav-links" ng-click="setView('login')">Already have an account? Login</div>
        </div>

        <!-- Login View -->
        <div ng-if="view == 'login'">
            <h2>User Login</h2>
            <div class="form-group">
                <input type="email" ng-model="loginData.email" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" ng-model="loginData.password" placeholder="Password">
            </div>
            <button ng-click="login()">Login</button>
            <div class="nav-links" ng-click="setView('register')">Need an account? Register</div>
        </div>

        <!-- Profile View -->
        <div ng-if="view == 'profile'" class="profile">
            <h2>User Profile</h2>
            <p><strong>Name:</strong> {{ currentUser.name }}</p>
            <p><strong>Email:</strong> {{ currentUser.email }}</p>
            <button style="background:#dc3545" ng-click="logout()">Logout</button>
        </div>
    </div>

    <script>
        var app = angular.module('userApp', []);
        app.controller('UserController', function ($scope) {
            $scope.view = 'register';
            $scope.users = [];
            $scope.regData = {};
            $scope.loginData = {};
            $scope.currentUser = null;

            $scope.setView = function (v) { $scope.view = v; };

            $scope.register = function () {
                if (!$scope.regData.name || !$scope.regData.email || !$scope.regData.password) return alert('Fill all fields');
                $scope.users.push(angular.copy($scope.regData));
                alert('Registered successfully!');
                $scope.regData = {};
                $scope.view = 'login';
            };

            $scope.login = function () {
                var user = $scope.users.find(u => u.email === $scope.loginData.email && u.password === $scope.loginData.password);
                if (user) {
                    $scope.currentUser = user;
                    $scope.view = 'profile';
                } else {
                    alert('Invalid credentials');
                }
            };

            $scope.logout = function () {
                $scope.currentUser = null;
                $scope.view = 'login';
            };
        });
    </script>
</body>

</html>
