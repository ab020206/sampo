<!-- 
W10 Develop a to-do list that automatically saves tasks (add, update, delete) to the server 
using AJAX without requiring a page refresh. 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List | AJAX</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 50px;
        }

        .todo-container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .completed {
            text-decoration: line-through;
            color: #888;
        }

        .status-bar {
            font-size: 0.8rem;
            color: #666;
            margin-top: 20px;
            text-align: right;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="todo-container">
            <h2 class="text-center mb-4">My Tasks</h2>

            <div class="input-group">
                <input type="text" id="taskInput" class="form-control" placeholder="Add new task...">
                <button class="btn btn-primary" onclick="addTask()">Add</button>
            </div>

            <ul id="taskList" class="task-list">
                <!-- AJAX Content -->
            </ul>

            <div class="status-bar" id="status">Ready</div>
        </div>
    </div>

    <script>
        const API_URL = '/api/tasks';

        async function fetchTasks() {
            updateStatus('Fetching...');
            try {
                const res = await fetch(API_URL);
                const tasks = await res.json();
                renderTasks(tasks);
                updateStatus('Connected');
            } catch (err) {
                updateStatus('Server error');
            }
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;

            updateStatus('Saving...');
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                input.value = '';
                fetchTasks();
            } catch (err) {
                updateStatus('Failed to add');
            }
        }

        async function deleteTask(id) {
            updateStatus('Deleting...');
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchTasks();
            } catch (err) {
                updateStatus('Failed to delete');
            }
        }

        async function updateTask(id, currentText) {
            const newText = prompt("Update task:", currentText);
            if (newText === null || newText.trim() === "") return;

            updateStatus('Updating...');
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: newText })
                });
                fetchTasks();
            } catch (err) {
                updateStatus('Failed to update');
            }
        }

        async function toggleComplete(id, completed) {
            updateStatus('Syncing...');
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: !completed })
                });
                fetchTasks();
            } catch (err) {
                updateStatus('Failed to sync');
            }
        }

        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.length ? '' : '<li class="text-center text-muted py-3">No tasks found.</li>';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.innerHTML = `
                    <div class="d-flex align-items-center">
                        <input type="checkbox" class="me-2" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${task.id}, ${task.completed})">
                        <span class="${task.completed ? 'completed' : ''}" style="cursor:pointer" onclick="updateTask(${task.id}, '${task.text}')">${task.text}</span>
                    </div>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteTask(${task.id})">Delete</button>
                `;
                list.appendChild(li);
            });
        }

        function updateStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        // Handle Enter key
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Initial Load
        fetchTasks();
    </script>
</body>

</html>
