<!-- 
W12 Create a basic to-do list where users can add, edit, and delete tasks. 
Use Angular’s two-way data binding to update tasks dynamically. 
-->
<!DOCTYPE html>
<html lang="en" ng-app="todoApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngularJS To-Do List | W12</title>
    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            padding-top: 50px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .todo-container {
            max-width: 500px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f1f1;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .completed {
            text-decoration: line-through;
            color: #888;
        }

        .edit-input {
            border: 1px solid #ddd;
            padding: 2px 5px;
            border-radius: 4px;
        }
    </style>
</head>

<body ng-controller="todoCtrl">

    <div class="container">
        <div class="todo-container">
            <h2 class="text-center fw-bold mb-4">Angular Tasks</h2>

            <div class="input-group mb-4">
                <input type="text" class="form-control" placeholder="Add a new task..." ng-model="newTaskText">
                <button class="btn btn-primary px-4" ng-click="addTask()">Add</button>
            </div>

            <div class="task-list">
                <div class="task-item" ng-repeat="task in tasks">
                    <div class="d-flex align-items-center flex-grow-1">
                        <input type="checkbox" class="me-2" ng-model="task.completed">

                        <!-- Dynamic Update with Two-Way Binding -->
                        <span ng-hide="task.editing" ng-class="{'completed': task.completed}" class="flex-grow-1"
                            style="cursor: pointer;" ng-click="editTask(task)">{{task.text}}</span>

                        <input type="text" class="edit-input flex-grow-1" ng-show="task.editing" ng-model="task.text"
                            ng-blur="saveTask(task)" ng-keyup="$event.keyCode == 13 && saveTask(task)">
                    </div>

                    <div class="ms-2">
                        <button class="btn btn-sm btn-link text-danger text-decoration-none"
                            ng-click="deleteTask($index)">
                            Delete
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-4 pt-3 border-top d-flex justify-content-between text-muted small">
                <span>{{(tasks | filter:{completed:false}).length}} pending tasks</span>
                <span class="text-primary" style="cursor:pointer" ng-click="clearCompleted()">Clear completed</span>
            </div>
        </div>
    </div>

    <script>
        var app = angular.module('todoApp', []);

        app.controller('todoCtrl', function ($scope) {
            // Initial Data
            $scope.tasks = [
                { text: 'Learn AngularJS', completed: false, editing: false },
                { text: 'Complete WAD Practical', completed: true, editing: false },
                { text: 'Watch a movie', completed: false, editing: false },
                { text: 'Go for a walk', completed: false, editing: false },
                { text: 'Read a book', completed: false, editing: false },
                { text: 'Call a friend', completed: false, editing: false },

            ];

            // Add Task
            $scope.addTask = function () {
                if ($scope.newTaskText) {
                    $scope.tasks.push({
                        text: $scope.newTaskText,
                        completed: false,
                        editing: false
                    });
                    $scope.newTaskText = '';
                }
            };

            // Delete Task
            $scope.deleteTask = function (index) {
                $scope.tasks.splice(index, 1);
            };

            // Edit Mode
            $scope.editTask = function (task) {
                task.editing = true;
            };

            // Save Edit
            $scope.saveTask = function (task) {
                task.editing = false;
            };

            // Clear Completed
            $scope.clearCompleted = function () {
                $scope.tasks = $scope.tasks.filter(function (task) {
                    return !task.completed;
                });
            };
        });
    </script>
</body>

</html>
