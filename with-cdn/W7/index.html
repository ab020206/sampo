W7 Create the following web page of Facebook using Bootstrap.

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Log In or Sign Up</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: Helvetica, Arial, sans-serif;
        }

        .fb-logo {
            color: #1877f2;
            font-size: 4rem;
            font-weight: bold;
        }

        .fb-text {
            font-size: 1.7rem;
            line-height: 1.2;
            margin-top: -10px;
        }

        .login-card {
            background: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
            padding: 20px;
        }

        .btn-fb-login {
            background-color: #1877f2;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .btn-fb-login:hover {
            background-color: #166fe5;
            color: white;
        }

        .btn-fb-create {
            background-color: #42b72a;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
        }

        .btn-fb-create:hover {
            background-color: #36a420;
            color: white;
        }

        .forgot-link {
            color: #1877f2;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .footer-text {
            font-size: 0.9rem;
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="row w-100 align-items-center">
            <!-- Left Content -->
            <div class="col-lg-7 d-none d-lg-block pe-lg-5">
                <h1 class="fb-logo mb-0">facebook</h1>
                <p class="fb-text text-dark">Facebook helps you connect and share with the people in your life.</p>
            </div>

            <!-- Right Content (Login Card) -->
            <div class="col-lg-5">
                <div class="mx-auto" style="max-width: 400px;">
                    <div class="d-lg-none text-center mb-4">
                        <h1 class="fb-logo mb-0">facebook</h1>
                    </div>
                    <div class="card login-card">
                        <form>
                            <div class="mb-3">
                                <input type="text" class="form-control form-control-lg"
                                    placeholder="Email address or phone number" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control form-control-lg" placeholder="Password"
                                    required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-fb-login py-2">Log In</button>
                            </div>
                            <div class="text-center mt-3">
                                <a href="#" class="forgot-link">Forgotten password?</a>
                            </div>
                            <hr>
                            <div class="text-center">
                                <button type="button" class="btn btn-fb-create py-2 px-4 mt-2">Create new
                                    account</button>
                            </div>
                        </form>
                    </div>
                    <p class="text-center footer-text"><a href="#" class="fw-bold text-dark text-decoration-none">Create
                            a Page</a> for a celebrity, brand or business.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
