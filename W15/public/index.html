<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W15 - Product Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { transition: transform 0.3s; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
        .product-card:hover { transform: translateY(-10px); }
        .product-img { height: 200px; object-fit: cover; }
        .price-tag { font-size: 1.25rem; font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body class="bg-light">

<div class="container my-5">
    <h2 class="text-center fw-bold mb-5">Modern Product Catalog</h2>
    <div class="row g-4" id="catalog">
        <!-- Products will be loaded here -->
    </div>
</div>

<script>
    async function loadProducts() {
        try {
            const res = await fetch('/api/products');
            const products = await res.json();
            const catalog = document.getElementById('catalog');
            
            catalog.innerHTML = products.map(p => `
                <div class="col-md-3">
                    <div class="card h-100 product-card">
                        <img src="${p.image}" class="card-img-top product-img" alt="${p.name}">
                        <div class="card-body">
                            <h5 class="card-title fw-semibold">${p.name}</h5>
                            <p class="price-tag">$${p.price.toFixed(2)}</p>
                            <button class="btn btn-primary w-100 rounded-pill">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error('Error loading products:', err);
        }
    }

    loadProducts();
</script>

</body>
</html>
