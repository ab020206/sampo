<!-- 
W15 Build a product catalog where product details (name, price, image) are stored in a JSON file. 
The Node.js server should provide the data as an API for a front-end page to display products. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W15 | Product Catalog</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { max-width: 100%; border-radius: 4px; }
        .price { font-weight: bold; color: green; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Product Catalog (API Data)</h2>
    <div class="grid" id="productGrid">
        <!-- Products will load here -->
    </div>

    <script>
        async function fetchProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                const grid = document.getElementById('productGrid');
                products.forEach(p => {
                    grid.innerHTML += `<div class="card">
                        <img src="${p.image}" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <p class="price">${p.price}</p>
                    </div>`;
                });
            } catch (err) {
                console.error('Error fetching products:', err);
            }
        }
        fetchProducts();
    </script>
</body>
</html>
