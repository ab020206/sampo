<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W15 | Product Catalog API</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 40px 0; }
        .product-card { 
            border: none; 
            border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .price { font-size: 1.5rem; font-weight: 800; color: #198754; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="fw-bold">Product Catalog</h1>
        <button class="btn btn-success rounded-pill px-4" onclick="fetchProducts()">Load Catalog</button>
    </div>

    <div id="catalogGrid" class="row g-4">
        <!-- Products from Node API -->
        <div class="col-12 text-center text-muted">
            <p>Click "Load Catalog" to fetch products from Node.js server.</p>
        </div>
    </div>
</div>

<script>
    async function fetchProducts() {
        const grid = document.getElementById('catalogGrid');
        grid.innerHTML = '<div class="text-center py-5">Connecting to Product API...</div>';

        try {
            const res = await fetch('http://localhost:4000/api/products');
            if (!res.ok) throw new Error();
            const products = await res.json();

            grid.innerHTML = products.map(p => `
                <div class="col-md-6 col-lg-4">
                    <div class="card product-card p-3 h-100">
                        <div class="card-body d-flex flex-column">
                            <span class="badge bg-light text-dark mb-2 align-self-start">${p.category}</span>
                            <h4 class="fw-bold">${p.name}</h4>
                            <p class="text-muted small">High-quality ${p.name} served via Node API.</p>
                            <div class="mt-auto d-flex justify-content-between align-items-baseline">
                                <span class="price">${p.price}</span>
                                <button class="btn btn-outline-dark btn-sm rounded-pill">View Details</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (e) {
            grid.innerHTML = `
                <div class="col-12 text-center text-danger py-5">
                    <h5>API Server Offline</h5>
                    <p>Run <code>node server.js</code> in the W15 folder to start the catalog server.</p>
                </div>
            `;
        }
    }
</script>

</body>
</html>
