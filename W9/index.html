<!-- 
W9 Create a weather application using JavaScript and AJAX where users enter a city name, 
and AJAX fetches real-time weather data dynamically from local repository map having city with temperature, humidity, and conditions. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App | W9</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #e3f2fd; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { padding: 10px; width: 70%; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
        button { padding: 10px 20px; background-color: #1e88e5; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #1565c0; }
        .result { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; display: none; }
        .temp { font-size: 2.5rem; font-weight: bold; color: #1e88e5; margin: 10px 0; }
        .info { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Weather Finder</h2>
        <input type="text" id="cityInput" placeholder="Enter city name...">
        <button onclick="getWeather()">Search</button>

        <div id="result" class="result">
            <h3 id="resCity">City Name</h3>
            <div id="resTemp" class="temp">--°C</div>
            <div class="info">
                <p>Condition: <span id="resCond">--</span></p>
                <p>Humidity: <span id="resHum">--</span></p>
            </div>
        </div>
        <div id="error" style="color: red; margin-top: 10px; display: none;">City not found!</div>
    </div>

    <script>
        function getWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) return;

            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'weather.json', true);
            xhr.onload = function() {
                if (this.status === 200) {
                    const data = JSON.parse(this.responseText);
                    const foundCity = Object.keys(data).find(k => k.toLowerCase() === city.toLowerCase());

                    if (foundCity) {
                        const weather = data[foundCity];
                        document.getElementById('resCity').innerText = foundCity;
                        document.getElementById('resTemp').innerText = weather.temp;
                        document.getElementById('resCond').innerText = weather.condition;
                        document.getElementById('resHum').innerText = weather.humidity;
                        
                        document.getElementById('result').style.display = 'block';
                        document.getElementById('error').style.display = 'none';
                    } else {
                        document.getElementById('result').style.display = 'none';
                        document.getElementById('error').style.display = 'block';
                    }
                }
            };
            xhr.send();
        }
    </script>
</body>
</html>
