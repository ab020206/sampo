<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W9 | Simple Weather</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .temp-val { font-size: 4rem; font-weight: 800; color: #3a7bd5; }
        .weather-info { margin-top: 25px; padding-top: 25px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="weather-card">
    <h2 class="fw-bold mb-4">Weather App</h2>
    
    <div class="input-group mb-4">
        <input type="text" id="cityInput" class="form-control form-control-lg border-0 bg-light rounded-start-pill ps-4" placeholder="Enter City (Mumbai, London...)">
        <button class="btn btn-primary rounded-end-pill px-4" onclick="fetchWeather()">Search</button>
    </div>

    <!-- Results Area -->
    <div id="weatherResult" style="display: none;">
        <img src="weather.png" width="100" class="mb-2">
        <h1 id="cityName" class="mb-0">City Name</h1>
        <p id="condition" class="text-muted h5 mb-3">Sunny</p>
        <div class="temp-val" id="temp">30°C</div>
        
        <div class="row weather-info">
            <div class="col-6">
                <p class="mb-0 text-muted small">Humidity</p>
                <h5 id="humidity">--</h5>
            </div>
            <div class="col-6">
                <p class="mb-0 text-muted small">Wind Speed</p>
                <h5 id="wind">--</h5>
            </div>
        </div>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="text-danger mt-3" style="display: none;">
        <i class="fas fa-exclamation-circle me-2"></i> City not found in our data.
    </div>
</div>

<script>
    function fetchWeather() {
        const city = document.getElementById('cityInput').value.trim();
        if (!city) return;

        // Using AJAX (XMLHttpRequest) to fetch from local JSON
        const xhr = new XMLHttpRequest();
        xhr.open('GET', 'weather.json', true);
        
        xhr.onload = function() {
            if (this.status === 200) {
                const data = JSON.parse(this.responseText);
                
                // Case-insensitive search
                const foundCity = Object.keys(data).find(key => key.toLowerCase() === city.toLowerCase());

                if (foundCity) {
                    const info = data[foundCity];
                    document.getElementById('weatherResult').style.display = 'block';
                    document.getElementById('errorMessage').style.display = 'none';
                    
                    document.getElementById('cityName').innerText = foundCity;
                    document.getElementById('temp').innerText = info.temp;
                    document.getElementById('condition').innerText = info.condition;
                    document.getElementById('humidity').innerText = info.humidity;
                    document.getElementById('wind').innerText = info.wind;
                } else {
                    document.getElementById('weatherResult').style.display = 'none';
                    document.getElementById('errorMessage').style.display = 'block';
                }
            }
        };

        xhr.onerror = function() {
            alert("Error fetching data!");
        };

        xhr.send();
    }

    // Search on Enter key
    document.getElementById('cityInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') fetchWeather();
    });
</script>

</body>
</html>
