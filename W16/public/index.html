<!-- 
W16 Create a Node.js application that serves as a static website for a restaurant or art gallery. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Art Gallery</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-banner {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('banner.png');
            background-size: cover;
            background-position: center;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .art-card img { height: 250px; object-fit: cover; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">CITY GALLERY</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="#">Home</a>
            <a class="nav-link" href="#">Exhibitions</a>
            <a class="nav-link" href="#">Contact</a>
        </div>
    </div>
</nav>

<div class="hero-banner">
    <div class="text-center">
        <h1 class="display-3 fw-bold">Explore Modern Art</h1>
        <p class="lead">A curated collection of contemporary masterpieces.</p>
    </div>
</div>

<div class="container my-5">
    <h2 class="text-center fw-bold mb-5">Featured Artworks</h2>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card art-card border-0 shadow-sm">
                <img src="banner.png" class="card-img-top" alt="Art">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Ocean Dreams</h5>
                    <p class="text-muted small">Oil on Canvas, 2024</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card art-card border-0 shadow-sm">
                <img src="banner.png" class="card-img-top" alt="Art">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Urban Silence</h5>
                    <p class="text-muted small">Mixed Media, 2023</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card art-card border-0 shadow-sm">
                <img src="banner.png" class="card-img-top" alt="Art">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Desert Sun</h5>
                    <p class="text-muted small">Watercolor, 2024</p>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-light py-5 border-top">
    <div class="container text-center">
        <p class="text-muted">&copy; 2026 City Art Gallery. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
