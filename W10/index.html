<!-- 
W10 Develop a to-do list that automatically saves tasks (add, update, delete) to the server 
using AJAX without requiring a page refresh. 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W10 | My To-Do List</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            padding-top: 50px;
        }

        .todo-box {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .list-group-item {
            border: none;
            border-bottom: 1px solid #f1f1f1;
            padding: 15px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-group-item:last-child {
            border-bottom: none;
        }

        .btn-delete {
            color: #ff4757;
            cursor: pointer;
            border: none;
            background: none;
        }

        .btn-delete:hover {
            color: #ff6b81;
        }

        .status-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="todo-box">
            <h3 class="fw-bold text-center mb-4">My Tasks</h3>

            <div class="input-group mb-4">
                <input type="text" id="taskInput" class="form-control border-0 bg-light p-3 rounded-start"
                    placeholder="Write a new task...">
                <button class="btn btn-primary px-4 rounded-end" onclick="addTask()">Add Task</button>
            </div>

            <ul id="taskList" class="list-group">
                <!-- Tasks injected by AJAX -->
            </ul>

            <div class="mt-4 pt-3 border-top d-flex justify-content-between align-items-center">
                <span class="text-muted small">Server Status:</span>
                <span id="status" class="badge bg-success status-badge">Connected</span>
            </div>
        </div>
    </div>

    <script>
        // Note: Since this is a standalone demo, we simulate the server response.
        // In a real environment, these functions would call a PHP or Node.js endpoint.

        let tasks = [];

        // Load initial tasks (AJAX GET)
        function loadTasks() {
            showStatus('Fetching...');

            // Simulating AJAX call
            setTimeout(() => {
                tasks = JSON.parse(localStorage.getItem('todo_tasks')) || [];
                renderTasks();
                showStatus('Up to date');
            }, 300);
        }

        // Add task (AJAX POST)
        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;

            showStatus('Saving...');

            // Simulating Server Request
            setTimeout(() => {
                const newTask = { id: Date.now(), text: text };
                tasks.push(newTask);
                saveToStorage();
                input.value = '';
                renderTasks();
                showStatus('Saved');
            }, 500);
        }

        // Delete task (AJAX DELETE)
        function deleteTask(id) {
            showStatus('Deleting...');

            setTimeout(() => {
                tasks = tasks.filter(t => t.id !== id);
                saveToStorage();
                renderTasks();
                showStatus('Deleted');
            }, 400);
        }

        // Update task (AJAX PUT/PATCH - Simulated by clicking text)
        function updateTask(id) {
            const newText = prompt("Update task:", tasks.find(t => t.id === id).text);
            if (newText === null || newText.trim() === "") return;

            showStatus('Updating...');

            setTimeout(() => {
                tasks = tasks.map(t => t.id === id ? { ...t, text: newText } : t);
                saveToStorage();
                renderTasks();
                showStatus('Updated');
            }, 400);
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.length ? '' : '<li class="text-center text-muted py-4">No tasks yet.</li>';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'list-group-item animate-fade-in';
                li.innerHTML = `
                <span onclick="updateTask(${task.id})" style="cursor:pointer" title="Click to edit">${task.text}</span>
                <button class="btn-delete" onclick="deleteTask(${task.id})">
                    <i class="fas fa-trash-alt"></i> Delete
                </button>
            `;
                list.appendChild(li);
            });
        }

        function saveToStorage() {
            localStorage.setItem('todo_tasks', JSON.stringify(tasks));
        }

        function showStatus(msg) {
            const status = document.getElementById('status');
            status.innerText = msg;
            status.className = 'badge bg-warning status-badge';
            if (msg === 'Saved' || msg === 'Up to date' || msg === 'Deleted' || msg === 'Updated') {
                setTimeout(() => {
                    status.innerText = 'Connected';
                    status.className = 'badge bg-success status-badge';
                }, 1000);
            }
        }

        // Load Font Awesome for icons
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css';
        document.head.appendChild(link);

        // Initial Load
        window.onload = loadTasks;
    </script>

</body>

</html>
