<!-- 
W11 Write a JavaScript Program to create a login (username, password) and registration form (name, email, mobile number, dob, city, address) 
and push to an array/local storage with the AJAX POST method and a data list in a new page. 
Add proper validations for each form element. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W11 | Registration & Login</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .toggle { text-align: center; margin-top: 10px; cursor: pointer; color: blue; }
        .error { color: red; font-size: 0.8rem; display: none; }
    </style>
</head>
<body>
    <div class="container" id="authBox">
        <div id="loginSection">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username (Email)</label>
                    <input type="email" id="loginUser" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" required>
                </div>
                <button type="submit">Login</button>
            </form>
            <div class="toggle" onclick="toggleForm()">New User? Register here</div>
        </div>

        <div id="regSection" style="display:none;">
            <h2>Register</h2>
            <form id="regForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="regName" required minlength="3">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="regMobile" required pattern="[0-9]{10}">
                </div>
                <div class="form-group">
                    <label>DOB</label>
                    <input type="date" id="regDob" required>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="regCity" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="regAddress" required></textarea>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPass" required minlength="6">
                </div>
                <button type="submit">Register</button>
            </form>
            <div class="toggle" onclick="toggleForm()">Back to Login</div>
        </div>
    </div>

    <script>
        function toggleForm() {
            const login = document.getElementById('loginSection');
            const reg = document.getElementById('regSection');
            if (login.style.display === 'none') {
                login.style.display = 'block';
                reg.style.display = 'none';
            } else {
                login.style.display = 'none';
                reg.style.display = 'block';
            }
        }

        // Registration Logic
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect Data
            const userData = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                mobile: document.getElementById('regMobile').value,
                dob: document.getElementById('regDob').value,
                city: document.getElementById('regCity').value,
                address: document.getElementById('regAddress').value,
                pass: document.getElementById('regPass').value
            };

            // Simulate AJAX POST to Local Storage (as per array/local storage requirement)
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            users.push(userData);
            localStorage.setItem('users', JSON.stringify(users));

            alert('Registration Successful! Redirecting to data list...');
            window.location.href = 'users.html';
        });

        // Login Logic
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const found = users.find(u => u.email === email && u.pass === pass);

            if (found) {
                alert('Login Successful!');
                window.location.href = 'users.html';
            } else {
                alert('Invalid Credentials!');
            }
        });
    </script>
</body>
</html>
