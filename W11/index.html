<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W11 | Login & Register</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 100%; max-width: 400px; padding: 35px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .toggle-link { cursor: pointer; color: #0d6efd; font-weight: 600; }
        .toggle-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-card">
    <!-- Register Form -->
    <div id="registerSection">
        <h3 class="fw-bold mb-4">Create Account</h3>
        <form id="regForm">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">NAME</label>
                <input type="text" id="regName" class="form-control form-control-lg bg-light border-0" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">EMAIL</label>
                <input type="email" id="regEmail" class="form-control form-control-lg bg-light border-0" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">PASSWORD</label>
                <input type="password" id="regPass" class="form-control form-control-lg bg-light border-0" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-4 rounded-pill">Sign Up</button>
        </form>
        <p class="text-center small text-muted">Already have an account? <span class="toggle-link" onclick="toggleAuth()">Login</span></p>
    </div>

    <!-- Login Form -->
    <div id="loginSection" style="display: none;">
        <h3 class="fw-bold mb-4">Welcome Back</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">EMAIL</label>
                <input type="email" id="loginEmail" class="form-control form-control-lg bg-light border-0" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">PASSWORD</label>
                <input type="password" id="loginPass" class="form-control form-control-lg bg-light border-0" required>
            </div>
            <button type="submit" class="btn btn-success btn-lg w-100 mb-4 rounded-pill">Login</button>
        </form>
        <p class="text-center small text-muted">Don't have an account? <span class="toggle-link" onclick="toggleAuth()">Register</span></p>
    </div>
</div>

<script>
    function toggleAuth() {
        const reg = document.getElementById('registerSection');
        const login = document.getElementById('loginSection');
        if (reg.style.display === 'none') {
            reg.style.display = 'block';
            login.style.display = 'none';
        } else {
            reg.style.display = 'none';
            login.style.display = 'block';
        }
    }

    // AJAX POST Simulation using XMLHttpRequest
    function sendRequest(url, data, callback) {
        console.log("AJAX POST to: " + url, data);
        // Simulating network delay
        setTimeout(() => {
            callback({ success: true, data: data });
        }, 600);
    }

    // Registration Handler
    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        const user = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            pass: document.getElementById('regPass').value
        };

        sendRequest('/api/register', user, function(response) {
            if (response.success) {
                let users = JSON.parse(localStorage.getItem('registered_users')) || [];
                if (users.find(u => u.email === user.email)) {
                    alert("This email is already registered!");
                } else {
                    users.push(user);
                    localStorage.setItem('registered_users', JSON.stringify(users));
                    alert("Account Created! You can now login.");
                    toggleAuth();
                    document.getElementById('regForm').reset();
                }
            }
        });
    };

    // Login Handler
    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const credentials = {
            email: document.getElementById('loginEmail').value,
            pass: document.getElementById('loginPass').value
        };

        sendRequest('/api/login', credentials, function(response) {
            const users = JSON.parse(localStorage.getItem('registered_users')) || [];
            const found = users.find(u => u.email === credentials.email && u.pass === credentials.pass);
            
            if (found) {
                alert("Login Successful! Welcome, " + found.name);
                window.location.reload(); // Refresh session
            } else {
                alert("Invalid email or password. Please try again.");
            }
        });
    };
</script>
</body>
</html>
