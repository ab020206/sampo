<!-- 
W11 Write a JavaScript Program to create a login (username, password) and registration form (name, email, mobile number, dob, city, address) 
and push to an array/local storage with the AJAX POST method and a data list in a new page. 
Add proper validations for each form element. 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal | Auth</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 50px;
        }

        .auth-container {
            max-width: 450px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .toggle-btn {
            color: #007bff;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.9rem;
        }

        .error-msg {
            font-size: 0.8rem;
            color: #dc3545;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="auth-container">
            <!-- Login Section -->
            <div id="loginSection">
                <h2 class="text-center mb-4">Login</h2>
                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" id="loginUser" required>
                        <div class="invalid-feedback">Please enter your username.</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="loginPass" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                </form>
                <div class="text-center mt-3">
                    <span class="text-muted small">New here?</span>
                    <span class="toggle-btn" onclick="showReg()">Create Account</span>
                </div>
            </div>

            <!-- Registration Section -->
            <div id="regSection" style="display:none;">
                <h2 class="text-center mb-4">Register</h2>
                <form id="regForm" novalidate>
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="regUser" required minlength="4">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="regName" required minlength="3">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="regEmail" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Mobile</label>
                            <input type="tel" class="form-control" id="regMobile" required pattern="[0-9]{10}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">DOB</label>
                            <input type="date" class="form-control" id="regDob" required>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" id="regCity" required>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" id="regAddress" rows="2" required></textarea>
                        </div>
                        <div class="col-md-12 mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="regPass" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
                <div class="text-center mt-3">
                    <span class="text-muted small">Already have an account?</span>
                    <span class="toggle-btn" onclick="showLogin()">Login</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showReg() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('regSection').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('regSection').style.display = 'none';
        }

        // Registration Logic (Simulating AJAX POST to Local Storage)
        document.getElementById('regForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const form = this;
            if (!form.checkValidity()) {
                e.stopPropagation();
                form.classList.add('was-validated');
                return;
            }

            const newUser = {
                username: document.getElementById('regUser').value,
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                mobile: document.getElementById('regMobile').value,
                dob: document.getElementById('regDob').value,
                city: document.getElementById('regCity').value,
                address: document.getElementById('regAddress').value,
                password: document.getElementById('regPass').value
            };

            // Get existing users or empty array
            let users = JSON.parse(localStorage.getItem('users')) || [];

            // Check if username exists
            if (users.find(u => u.username === newUser.username)) {
                alert('Username already taken!');
                return;
            }

            // Push to array
            users.push(newUser);
            // Save to Local Storage
            localStorage.setItem('users', JSON.stringify(users));

            alert('Registration Successful!');
            window.location.href = 'users.html';
        });

        // Login Logic
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const form = this;
            if (!form.checkValidity()) {
                e.stopPropagation();
                form.classList.add('was-validated');
                return;
            }

            const username = document.getElementById('loginUser').value;
            const password = document.getElementById('loginPass').value;

            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                alert('Login Successful!');
                window.location.href = 'users.html';
            } else {
                alert('Invalid credentials!');
            }
        });
    </script>
</body>

</html>
