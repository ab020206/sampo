<!-- 
W14 Create a Node.js server that reads user data from a JSON file and serves it as an API. 
A front-end page should display the list dynamically using HTML & JavaScript. 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W14 | User Directory API</title>
    <!-- Bootstrap CSS -->
    <link href="libs/bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 50px;
        }

        .directory-container {
            max-width: 800px;
            margin: auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .table-responsive {
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="directory-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold m-0">User Directory</h2>
                <button class="btn btn-primary" onclick="loadUsers()">Fetch Live Data</button>
            </div>

            <p class="text-muted">This page demonstrates fetching user data from a Node.js REST API dynamically.</p>

            <div class="table-responsive" id="resultArea" style="display:none;">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Email Address</th>
                            <th>Location</th>
                        </tr>
                    </thead>
                    <tbody id="userBody">
                        <!-- AJAX content -->
                    </tbody>
                </table>
            </div>

            <div id="loading" class="text-center py-5 text-muted" style="display:none;">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                Connecting to API...
            </div>
        </div>
    </div>

    <script>
        async function loadUsers() {
            const resultArea = document.getElementById('resultArea');
            const loading = document.getElementById('loading');
            const body = document.getElementById('userBody');

            // Show loading state
            resultArea.style.display = 'none';
            loading.style.display = 'block';

            try {
                // Fetch from the Node.js API endpoint
                const response = await fetch('/api/users');
                
                if (!response.ok) throw new Error("API Connection Failed");
                
                const users = await response.json();
                
                // Clear and Populate Table
                body.innerHTML = '';
                users.forEach(user => {
                    const row = `
                        <tr>
                            <td><span class="badge bg-secondary">${user.id}</span></td>
                            <td class="fw-semibold">${user.name}</td>
                            <td>${user.email}</td>
                            <td>${user.city}</td>
                        </tr>
                    `;
                    body.innerHTML += row;
                });

                // Display results
                loading.style.display = 'none';
                resultArea.style.display = 'block';

            } catch (err) {
                loading.style.display = 'none';
                alert("Error: Unable to connect to the Node.js server. Please make sure server.js is running.");
                console.error('Fetch Error:', err);
            }
        }
    </script>
</body>

</html>
