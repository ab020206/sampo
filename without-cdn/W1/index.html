<!-- 
W1 Develop a responsive product catalog webpage using HTML, CSS, and JavaScript. 
The webpage should display products in a table format with images and implement pagination if there are more than 10 products. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog | W1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Product Catalog</h1>
            <p>Browse our collection of high-quality items</p>
        </header>

        <div class="table-container">
            <table id="productTable">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody id="productBody">
                    <!-- Products will be loaded here -->
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination">
            <!-- Pagination buttons will be loaded here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
