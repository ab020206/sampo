<!-- 
W11 Users Data List Page 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users List | Portal</title>
    <!-- Bootstrap CSS -->
    <link href="libs/bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 50px 0;
        }

        .list-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="list-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Registered Users</h2>
                <a href="index.html" class="btn btn-outline-primary btn-sm">Back to Portal</a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Username</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Mobile</th>
                            <th>DOB</th>
                            <th>City</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
            <div id="emptyMsg" class="text-center text-muted py-4" style="display:none;">
                No users registered yet.
            </div>
        </div>
    </div>

    <script>
        function fetchUsers() {
            try {
                const users = JSON.parse(localStorage.getItem('users')) || [];
                renderUsers(users);
            } catch (err) {
                alert("Failed to load users from Local Storage.");
            }
        }

        function renderUsers(users) {
            const body = document.getElementById('userTableBody');
            const empty = document.getElementById('emptyMsg');

            if (!users || users.length === 0) {
                empty.style.display = 'block';
                body.innerHTML = '';
                return;
            }

            empty.style.display = 'none';
            body.innerHTML = users.map(u => `
                <tr>
                    <td>${u.username}</td>
                    <td class="fw-bold">${u.name}</td>
                    <td>${u.email}</td>
                    <td>${u.mobile}</td>
                    <td>${u.dob}</td>
                    <td>${u.city}</td>
                </tr>
            `).join('');
        }

        // Initial Load
        fetchUsers();
    </script>
</body>

</html>
