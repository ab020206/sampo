<!-- 
W15 Build a product catalog where product details (name, price, image) are stored in a JSON file. 
The Node.js server should provide the data as an API for a front-end page to display products. 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W15 | Product Catalog API</title>
    <!-- Bootstrap CSS -->
    <link href="libs/bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            padding: 50px 0;
        }

        .catalog-container {
            max-width: 1000px;
            margin: auto;
        }

        .product-card {
            border: none;
            border-radius: 12px;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .product-image {
            height: 200px;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
            background-color: #eee;
        }

        .price-tag {
            color: #28a745;
            font-weight: 700;
            font-size: 1.25rem;
        }
    </style>
</head>

<body>

    <div class="container catalog-container">
        <div class="text-center mb-5">
            <h1 class="fw-bold">Product Catalog</h1>
            <p class="text-muted">Dynamic inventory fetched from Node.js JSON API</p>
        </div>

        <div class="row g-4" id="productGrid">
            <!-- Loading State -->
            <div class="col-12 text-center py-5" id="loader">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Loading inventory...</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchProducts() {
            const grid = document.getElementById('productGrid');
            const loader = document.getElementById('loader');

            try {
                // AJAX call to Node.js API
                const response = await fetch('/api/products');
                if (!response.ok) throw new Error("API Failure");
                
                const products = await response.json();
                
                // Clear loader
                grid.innerHTML = '';

                products.forEach(p => {
                    const productHtml = `
                        <div class="col-md-4 col-sm-6">
                            <div class="card h-100 product-card">
                                

                                <div class="card-body text-center">
                                    <h5 class="card-title fw-bold">${p.name}</h5>
                                    <p class="card-text text-muted small">Quality assured product from our premium collection.</p>
                                    <div class="price-tag">${p.price}</div>
                                    <button class="btn btn-outline-primary btn-sm mt-3 w-100">View Details</button>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += productHtml;
                });

            } catch (err) {
                grid.innerHTML = `
                    <div class="col-12 text-center text-danger py-5">
                        <p>Error: Failed to connect to server. Please ensure server.js is running.</p>
                    </div>
                `;
                console.error('Fetch Error:', err);
            }
        }

        // Initial fetch
        fetchProducts();
    </script>
</body>

</html>
