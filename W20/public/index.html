<!-- 
W20 Create a backend application for managing employee records using Node.js, Express.js, and MongoDB: 
Add employee, View all employees, Update employee, Delete employee. 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W20 | Employee CRUD</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #eee;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            padding: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .add-btn {
            background: #28a745;
            color: white;
            border: none;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .edit-btn {
            background: #ffc107;
            border: none;
            margin-right: 5px;
        }

        .del-btn {
            background: #dc3545;
            color: white;
            border: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Employee Management</h2>
        <div id="employeeForm">
            <input type="hidden" id="empId">
            <div class="form-group"><input type="text" id="empName" placeholder="Name"></div>
            <div class="form-group"><input type="email" id="empEmail" placeholder="Email"></div>
            <div class="form-group"><input type="text" id="empPos" placeholder="Position"></div>
            <div class="form-group"><input type="number" id="empSalary" placeholder="Salary"></div>
            <button class="add-btn" id="saveBtn" onclick="saveEmployee()">Add Employee</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Position</th>
                    <th>Salary</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="empBody"></tbody>
        </table>
    </div>

    <script>
        async function loadEmployees() {
            const res = await fetch('/api/employees');
            const data = await res.json();
            const body = document.getElementById('empBody');
            body.innerHTML = '';
            data.forEach(e => {
                body.innerHTML += `<tr>
                    <td>${e.name}</td>
                    <td>${e.position}</td>
                    <td>₹${e.salary}</td>
                    <td>
                        <button class="edit-btn" onclick="editEmp('${e._id}', '${e.name}', '${e.email}', '${e.position}', ${e.salary})">Edit</button>
                        <button class="del-btn" onclick="deleteEmp('${e._id}')">Del</button>
                    </td>
                </tr>`;
            });
        }

        async function saveEmployee() {
            const id = document.getElementById('empId').value;
            const data = {
                name: document.getElementById('empName').value,
                email: document.getElementById('empEmail').value,
                position: document.getElementById('empPos').value,
                salary: document.getElementById('empSalary').value
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/employees/${id}` : '/api/employees';

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            clearForm();
            loadEmployees();
        }

        async function deleteEmp(id) {
            await fetch(`/api/employees/${id}`, { method: 'DELETE' });
            loadEmployees();
        }

        function editEmp(id, name, email, pos, salary) {
            document.getElementById('empId').value = id;
            document.getElementById('empName').value = name;
            document.getElementById('empEmail').value = email;
            document.getElementById('empPos').value = pos;
            document.getElementById('empSalary').value = salary;
            document.getElementById('saveBtn').innerText = 'Update Employee';
        }

        function clearForm() {
            document.getElementById('empId').value = '';
            document.getElementById('empName').value = '';
            document.getElementById('empEmail').value = '';
            document.getElementById('empPos').value = '';
            document.getElementById('empSalary').value = '';
            document.getElementById('saveBtn').innerText = 'Add Employee';
        }

        loadEmployees();
    </script>
</body>

</html>
