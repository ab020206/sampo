<!-- 
W8 Create an event registration form using Bootstrap’s form components. 
Include input validation, floating labels, and tooltips to guide the user. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration | W8</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .form-container { 
            max-width: 600px; 
            margin: 50px auto; 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .form-header { text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h2 class="fw-bold">Event Registration</h2>
                <p class="text-muted">Register now to secure your spot!</p>
            </div>

            <form class="needs-validation" novalidate>
                <!-- Full Name -->
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="fullName" placeholder="Full Name" required>
                    <label for="fullName">Full Name</label>
                    <div class="invalid-feedback">Please enter your full name.</div>
                </div>

                <!-- Email -->
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required 
                           data-bs-toggle="tooltip" data-bs-placement="right" title="We'll send the ticket to this email.">
                    <label for="email">Email Address</label>
                    <div class="invalid-feedback">Please provide a valid email address.</div>
                </div>

                <!-- Phone -->
                <div class="form-floating mb-3">
                    <input type="tel" class="form-control" id="phone" placeholder="Phone Number" required pattern="[0-9]{10}">
                    <label for="phone">Phone Number (10 digits)</label>
                    <div class="invalid-feedback">Please enter a valid 10-digit phone number.</div>
                </div>

                <!-- Event Type -->
                <div class="form-floating mb-3">
                    <select class="form-select" id="eventSelect" required>
                        <option value="" selected disabled>Open this select menu</option>
                        <option value="workshop">Technical Workshop</option>
                        <option value="seminar">Business Seminar</option>
                        <option value="networking">Networking Event</option>
                    </select>
                    <label for="eventSelect">Select Event Type</label>
                    <div class="invalid-feedback">Please select an event.</div>
                </div>

                <!-- Terms -->
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" value="" id="termsCheck" required>
                    <label class="form-check-label" for="termsCheck">
                        I agree to the terms and conditions
                    </label>
                    <div class="invalid-feedback">You must agree before submitting.</div>
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <button class="btn btn-primary btn-lg" type="submit">Register Now</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Example starter JavaScript for disabling form submissions if there are invalid fields
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    } else {
                        alert('Registration successful!');
                    }
                    form.classList.add('was-validated')
                }, false)
            })

            // Initialize tooltips
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl)
            })
        })()
    </script>
</body>
</html>
