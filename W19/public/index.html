<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W19 | Student Marks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 shadow rounded">
        <h2 class="fw-bold mb-4">🎓 Student Records</h2>

        <div class="mb-4">
            <button class="btn btn-secondary me-2" onclick="loadAll()">Show All</button>
            <button class="btn btn-success" onclick="loadToppers()">Show Maths Toppers (>90)</button>
        </div>

        <table class="table table-bordered">
            <thead class="table-dark">
                <tr><th>Roll No</th><th>Name</th><th>Maths</th><th>Science</th><th>English</th><th>Action</th></tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>

        <!-- Update Section -->
        <div class="mt-5 p-3 border rounded bg-light" style="max-width: 400px;">
            <h6>Update Science Marks</h6>
            <div class="input-group">
                <input id="upRoll" class="form-control" placeholder="Roll No">
                <input id="upMarks" class="form-control" placeholder="New Marks">
                <button class="btn btn-warning" onclick="updateMarks()">Update</button>
            </div>
        </div>
    </div>

    <script>
        async function loadAll() {
            const res = await fetch('/api/students');
            const data = await res.json();
            render(data);
        }

        async function loadToppers() {
            const res = await fetch('/api/students/maths-toppers');
            const data = await res.json();
            render(data);
        }

        async function updateMarks() {
            const roll = document.getElementById('upRoll').value;
            const marks = document.getElementById('upMarks').value;
            await fetch('/api/students/' + roll, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ science: marks })
            });
            alert("Updated!");
            loadAll();
        }

        function render(data) {
            const tbody = document.getElementById('studentTable');
            tbody.innerHTML = data.map(s => `
                <tr>
                    <td>${s.rollNo}</td>
                    <td>${s.name}</td>
                    <td>${s.marks.maths}</td>
                    <td>${s.marks.science}</td>
                    <td>${s.marks.english}</td>
                    <td><span class="badge bg-info">View</span></td>
                </tr>
            `).join('');
        }

        loadAll();
    </script>
</body>
</html>
