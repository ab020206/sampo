<!-- 
W14 Create a Node.js server that reads user data from a JSON file and serves it as an API. 
A front-end page should display the list dynamically using HTML & JavaScript. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W14 | User Directory</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #333; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>User Directory (API Driven)</h2>
        <button onclick="loadUsers()">Fetch User Data</button>
        <table id="userTable" style="display:none;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>City</th>
                </tr>
            </thead>
            <tbody id="userBody"></tbody>
        </table>
    </div>

    <script>
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();
                const body = document.getElementById('userBody');
                body.innerHTML = '';
                users.forEach(user => {
                    body.innerHTML += `<tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.city}</td>
                    </tr>`;
                });
                document.getElementById('userTable').style.display = 'table';
            } catch (err) {
                console.error('Error fetching users:', err);
            }
        }
    </script>
</body>
</html>
