<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W5 | ShopMax - Premium Bootstrap Store</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f9fa;
        }

        :root { 
            --primary-color: #6366f1; 
            --dark-color: #0f172a;
        }

        .navbar {
            padding: 20px 0;
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(10px);
        }

        .navbar-brand { 
            font-weight: 800; 
            color: var(--dark-color) !important; 
            letter-spacing: -1px;
            font-size: 1.5rem;
        }

        .category-header { 
            background: white; 
            padding: 80px 0; 
            margin-bottom: 50px;
            border-bottom: 1px solid #edf2f7;
        }

        .card { 
            border: none; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 24px; 
            overflow: hidden; 
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.06); 
        }

        .card-img-top { 
            height: 240px; 
            object-fit: cover; 
            padding: 15px;
            border-radius: 30px;
        }

        .btn-primary { 
            background-color: var(--primary-color); 
            border: none; 
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-primary:hover { 
            background-color: #4f46e5; 
            transform: scale(1.02);
        }

        .badge-cat {
            background: #f1f5f9;
            color: #64748b;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 12px;
        }

        .price-tag {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--dark-color);
        }

        .filter-dropdown .btn {
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#">MyStore</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-4">
                    <div class="dropdown filter-dropdown">
                        <button class="btn btn-light dropdown-toggle" type="button" id="filterBtn" data-bs-toggle="dropdown">
                            <i class="fas fa-filter me-2"></i> Categories
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-3 p-2" style="border-radius: 15px;">
                            <li><a class="dropdown-item rounded-3" href="#" onclick="filterProducts('all')">All Products</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item rounded-3" href="#" onclick="filterProducts('mobiles')">Mobiles</a></li>
                            <li><a class="dropdown-item rounded-3" href="#" onclick="filterProducts('laptops')">Laptops</a></li>
                            <li><a class="dropdown-item rounded-3" href="#" onclick="filterProducts('watches')">Watches</a></li>
                        </ul>
                    </div>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Cart (0)</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<header class="category-header text-center">
    <div class="container">
        <h1 class="display-3 fw-bold mb-3" style="letter-spacing: -2px;">Online Shop</h1>
        <p class="lead text-muted mx-auto" style="max-width: 600px;">Buy the best products at cheap prices.</p>
    </div>
</header>

<div class="container mb-5 pb-5">
    <div class="row g-4" id="productGrid">
        <!-- Products will be injected here via JS -->
    </div>
</div>

<footer class="bg-dark text-white py-5 mt-5">
    <div class="container text-center">
        <p class="mb-2" style="opacity: 0.6;">&copy; 2026 My Online Store</p>
    </div>
</footer>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const products = [
        { name: "Samsung Phone", price: "$600", cat: "mobiles", img: "items.png" },
        { name: "iPhone 13", price: "$700", cat: "mobiles", img: "items.png" },
        { name: "HP Laptop", price: "$800", cat: "laptops", img: "items.png" },
        { name: "Dell Laptop", price: "$900", cat: "laptops", img: "items.png" },
        { name: "Smart Watch", price: "$100", cat: "watches", img: "items.png" },
        { name: "Digital Watch", price: "$50", cat: "watches", img: "items.png" },
        { name: "Gaming Laptop", price: "$1200", cat: "laptops", img: "items.png" },
        { name: "Google Pixel", price: "$500", cat: "mobiles", img: "items.png" }
    ];

    function displayProducts(items) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = items.map(p => `
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100 p-2">
                    <img src="${p.img}" class="card-img-top" alt="${p.name}">
                    <div class="card-body d-flex flex-column pt-3">
                        <span class="badge-cat">${p.cat}</span>
                        <h5 class="card-title mb-3 fw-bold">${p.name}</h5>
                        <p class="card-text text-muted small mb-4">This is a very good product. High quality and durable.</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="price-tag">${p.price}</span>
                            <button class="btn btn-primary btn-sm">Buy Now</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function filterProducts(category) {
        const dropdownBtn = document.getElementById('filterBtn');
        if (category === 'all') {
            dropdownBtn.innerHTML = '<i class="fas fa-filter me-2"></i> Categories';
            displayProducts(products);
        } else {
            dropdownBtn.innerHTML = `<i class="fas fa-filter me-2"></i> ${category.charAt(0).toUpperCase() + category.slice(1)}`;
            const filtered = products.filter(p => p.cat === category);
            displayProducts(filtered);
        }
    }

    window.onload = () => displayProducts(products);
</script>

</body>
</html>
