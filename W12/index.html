<!-- 
W12 Create a basic to-do list where users can add, edit, and delete tasks. 
Use Angular’s two-way data binding to update tasks dynamically. 
-->
<!DOCTYPE html>
<html ng-app="todoApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W12 | Angular To-Do</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; }
        .todo-box { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .input-group { display: flex; margin-bottom: 20px; }
        input { flex: 1; padding: 8px; }
        button { padding: 8px 15px; cursor: pointer; }
        .add-btn { background: #28a745; color: white; border: none; }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .edit-btn { background: #ffc107; border: none; margin-right: 5px; }
        .del-btn { background: #dc3545; color: white; border: none; }
    </style>
</head>
<body ng-controller="TodoController">
    <div class="todo-box">
        <h2>My To-Do List</h2>
        <div class="input-group">
            <!-- Two-way binding via ng-model -->
            <input type="text" ng-model="taskInput" placeholder="Enter task...">
            <button class="add-btn" ng-click="saveTask()">{{ editIndex !== null ? 'Update' : 'Add' }}</button>
        </div>
        <ul>
            <li ng-repeat="task in tasks">
                <span>{{ task }}</span>
                <div>
                    <button class="edit-btn" ng-click="editTask($index)">Edit</button>
                    <button class="del-btn" ng-click="deleteTask($index)">Delete</button>
                </div>
            </li>
        </ul>
    </div>

    <script>
        var app = angular.module('todoApp', []);
        app.controller('TodoController', function($scope) {
            $scope.tasks = ['Task 1', 'Task 2'];
            $scope.taskInput = '';
            $scope.editIndex = null;

            $scope.saveTask = function() {
                if (!$scope.taskInput) return;
                if ($scope.editIndex !== null) {
                    $scope.tasks[$scope.editIndex] = $scope.taskInput;
                    $scope.editIndex = null;
                } else {
                    $scope.tasks.push($scope.taskInput);
                }
                $scope.taskInput = '';
            };

            $scope.editTask = function(index) {
                $scope.taskInput = $scope.tasks[index];
                $scope.editIndex = index;
            };

            $scope.deleteTask = function(index) {
                $scope.tasks.splice(index, 1);
            };
        });
    </script>
</body>
</html>
