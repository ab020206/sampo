<!DOCTYPE html>
<html ng-app="todoApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W12 | Angular To-Do List</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body { background: #f8f9fa; padding-top: 60px; }
        .todo-card { max-width: 500px; margin: 0 auto; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .task-item { transition: 0.2s; border: none; border-bottom: 1px solid #eee; }
        .task-item:hover { background-color: #fcfcfc; }
    </style>
</head>
<body ng-controller="TodoController">

<div class="container">
    <div class="card todo-card p-4">
        <h2 class="text-center fw-bold mb-4 text-primary">My Task List</h2>

        <!-- Input Area (Two-way Binding) -->
        <div class="input-group mb-4">
            <input type="text" class="form-control p-3 border-0 bg-light" 
                   ng-model="taskName" placeholder="Enter task details...">
            <button class="btn btn-primary px-4" ng-click="saveTask()">
                {{ editIndex !== null ? 'Update' : 'Add' }}
            </button>
        </div>

        <!-- Task List -->
        <ul class="list-group list-group-flush">
            <li class="list-group-item task-item d-flex justify-content-between align-items-center py-3" 
                ng-repeat="task in tasks">
                <span class="fw-medium">{{ task }}</span>
                <div class="btn-group">
                    <button class="btn btn-outline-warning btn-sm" ng-click="editTask($index)">Edit</button>
                    <button class="btn btn-outline-danger btn-sm" ng-click="deleteTask($index)">Delete</button>
                </div>
            </li>
        </ul>

        <!-- Empty State -->
        <div class="text-center py-4 text-muted" ng-show="tasks.length == 0">
            <p>No tasks added yet. Start by adding one above!</p>
        </div>

        <div class="mt-4 pt-3 border-top text-center small text-muted">
            Total Tasks: {{ tasks.length }}
        </div>
    </div>
</div>

<script>
    var app = angular.module('todoApp', []);

    app.controller('TodoController', function($scope) {
        // Initial Data
        $scope.tasks = ["Wake up at 6 AM", "Attend Web Dev Lecture", "Complete Assignment"];
        $scope.taskName = "";
        $scope.editIndex = null;

        // Save Function (Add or Update)
        $scope.saveTask = function() {
            if (!$scope.taskName || $scope.taskName.trim() === "") {
                alert("Please enter a task name.");
                return;
            }

            if ($scope.editIndex !== null) {
                // Update existing task
                $scope.tasks[$scope.editIndex] = $scope.taskName;
                $scope.editIndex = null;
            } else {
                // Add new task
                $scope.tasks.push($scope.taskName);
            }

            $scope.taskName = ""; // Clear input
        };

        // Load task for editing
        $scope.editTask = function(index) {
            $scope.taskName = $scope.tasks[index];
            $scope.editIndex = index;
        };

        // Delete task
        $scope.deleteTask = function(index) {
            if (confirm("Are you sure you want to delete this task?")) {
                $scope.tasks.splice(index, 1);
                // Clear edit state if the editing task is deleted
                if ($scope.editIndex === index) {
                    $scope.editIndex = null;
                    $scope.taskName = "";
                }
            }
        };
    });
</script>

</body>
</html>
