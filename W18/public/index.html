<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W18 | Music Database</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 shadow rounded">
        <h2 class="fw-bold mb-4">🎵 Music Library</h2>
        
        <div class="row">
            <!-- Add Form -->
            <div class="col-md-4 border-end">
                <h5 class="mb-3">Add New Song</h5>
                <input id="title" class="form-control mb-2" placeholder="Song Title">
                <input id="artist" class="form-control mb-2" placeholder="Artist">
                <input id="album" class="form-control mb-2" placeholder="Album">
                <input id="year" type="number" class="form-control mb-3" placeholder="Year">
                <button class="btn btn-primary w-100" onclick="addSong()">Add to Library</button>
            </div>
            
            <!-- List Display -->
            <div class="col-md-8">
                <h5 class="mb-3">All Songs</h5>
                <table class="table table-striped">
                    <thead>
                        <tr><th>Title</th><th>Artist</th><th>Year</th><th>Action</th></tr>
                    </thead>
                    <tbody id="songList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadSongs() {
            const res = await fetch('/api/songs');
            const songs = await res.json();
            const tbody = document.getElementById('songList');
            tbody.innerHTML = songs.map(s => `
                <tr>
                    <td>${s.title}</td>
                    <td>${s.artist}</td>
                    <td>${s.year}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteSong('${s._id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function addSong() {
            const data = {
                title: document.getElementById('title').value,
                artist: document.getElementById('artist').value,
                album: document.getElementById('album').value,
                year: document.getElementById('year').value
            };
            if(!data.title || !data.artist) return alert("Please fill details");

            await fetch('/api/songs', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            loadSongs();
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        async function deleteSong(id) {
            if(confirm("Remove this song?")) {
                await fetch('/api/songs/' + id, { method: 'DELETE' });
                loadSongs();
            }
        }

        loadSongs();
    </script>
</body>
</html>
